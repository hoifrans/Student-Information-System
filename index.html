<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Information System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#eef2f7;
    transition:.4s;
}

header{
    position:relative;
    background:#004080;
    color:white;
    text-align:center;
    padding:25px;
}

#themeToggle{
    position:absolute;
    right:25px;
    top:20px;
    padding:10px 18px;
    border:none;
    border-radius:25px;
    background:#ffd700;
    color:#003366;
    font-weight:bold;
    cursor:pointer;
}

nav{
    background:#003366;
    display:flex;
    justify-content:center;
    gap:20px;
    padding:12px;
}

nav button{
    background:none;
    color:white;
    border:none;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

nav button:hover{
    color:#ffd700;
}

.container{
    width:90%;
    max-width:800px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#004080;
    margin-bottom:20px;
}

.row{
    display:flex;
    gap:15px;
    margin-bottom:15px;
}

.column{
    flex:1;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}

input,
select,
textarea{

    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;

}

textarea{
    resize:none;
}


.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    cursor:pointer;
}

.save{
    flex:1;
    padding:12px;
    background:#004080;
    color:white;
    border:none;
    border-radius:5px;
}

.reset{
    flex:1;
    padding:12px;
    background:#dc3545;
    color:white;
    border:none;
    border-radius:5px;
}

.export{
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#198754;
    color:white;
    border:none;
    border-radius:5px;
}

#success{
    display:none;
    margin-top:15px;
    padding:15px;
    background:#d4edda;
    color:#155724;
    text-align:center;
    border-radius:5px;
}

.studentCard{

    background:#f8f9fa;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    border-left:5px solid #004080;

}

.delete{

    margin-top:10px;
    padding:8px 15px;
    background:#dc3545;
    color:white;
    border:none;
    border-radius:5px;

}


.hidden{
    display:none;
}


footer{

    text-align:center;
    background:#004080;
    color:white;
    padding:15px;
    margin-top:30px;

}


#searchStudent{

    width:100%;
    padding:12px;
    border:2px solid #004080;
    border-radius:5px;
    font-size:16px;

}


body.dark{

    background:#121212;
    color:white;

}

body.dark .container{

    background:#1e1e1e;

}

body.dark input,
body.dark select,
body.dark textarea{

    background:#333;
    color:white;

}

body.dark .studentCard{

    background:#2b2b2b;

}

body.dark h2{

    color:#66b3ff;

}


@media(max-width:600px){

#themeToggle{

    position:static;
    margin-bottom:10px;

}

.row{

    flex-direction:column;

}

nav{

    flex-direction:column;
    align-items:center;

}

.container{

    width:95%;

}

}


</style>

</head>


<body>

<header>

<button id="themeToggle">
🌙 Dark Mode
</button>

<h1>
Student Information System
</h1>

<p>
Manage Student Records Efficiently
</p>

</header>


<nav>

<button onclick="showPage('registration')">
📝 Registration
</button>

<button onclick="showPage('records')">
📋 Records
</button>

</nav>


<div class="container">


<div id="registration">

<h2>
Student Registration Form
</h2>


<form id="studentForm">


<label>Student ID</label>
<input id="studentID" required>


<div class="row">

<div class="column">

<label>First Name</label>
<input id="fname" required>

</div>


<div class="column">

<label>Last Name</label>
<input id="lname" required>

</div>

</div>


<label>Year Level</label>

<select id="year">

<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>

</select>


<label>Program</label>

<select id="program">

<option>BS Information Technology</option>
<option>BS Computer Science</option>
<option>BS Information System</option>
<option>BS Computer Engineering</option>

</select>


<label>Email</label>
<input type="email" id="email" required>


<label>Phone Number</label>
<input id="phone" inputmode="numeric" required>


<label>Address</label>
<textarea id="address" rows="3"></textarea>


<div class="buttons">

<button class="save">
Save Information
</button>

<button type="reset" class="reset">
Clear
</button>

</div>

</form>


<div id="success"></div>

</div>
<!-- RECORD PAGE -->

<div id="records" class="hidden">

<h2>
Saved Student Records
</h2>


<input 
type="text" 
id="searchStudent" 
placeholder="🔍 Search by Student ID or Name..."
onkeyup="searchStudents()"
>


<br><br>


<div id="recordList">

</div>


<button class="export" onclick="exportRecords()">

📁 Export Records

</button>


</div>


</div>


<footer>

© 2026 Student Information System

</footer>



<script>


let students =
JSON.parse(localStorage.getItem("students")) || [];





function showPage(page){


document.getElementById("registration")
.classList.add("hidden");


document.getElementById("records")
.classList.add("hidden");



document.getElementById(page)
.classList.remove("hidden");



if(page=="records"){

displayRecords();

}


}







document.getElementById("studentForm")
.addEventListener("submit",function(e){


e.preventDefault();



let student={


id:studentID.value,

first:fname.value,

last:lname.value,

year:year.value,

program:program.value,

email:email.value,

phone:phone.value,

address:address.value


};





if(isNaN(student.id)){

alert("Student ID must contain numbers only");

return;

}



if(isNaN(student.phone)){

alert("Phone number must contain numbers only");

return;

}




students.push(student);



localStorage.setItem(
"students",
JSON.stringify(students)
);




document.getElementById("success").style.display="block";


document.getElementById("success").innerHTML=
"✅ Student saved successfully!";



this.reset();



});







function displayRecords(filteredStudents = students){


let list=document.getElementById("recordList");


list.innerHTML="";



if(filteredStudents.length==0){

list.innerHTML="<p>No matching records found.</p>";

return;

}



filteredStudents.forEach((s,index)=>{


list.innerHTML+=`


<div class="studentCard">


<b>Student ID:</b> ${s.id}<br>

<b>Name:</b> ${s.first} ${s.last}<br>

<b>Year:</b> ${s.year}<br>

<b>Program:</b> ${s.program}<br>

<b>Email:</b> ${s.email}<br>

<b>Phone:</b> ${s.phone}<br>

<b>Address:</b> ${s.address}



<br>


<button class="delete" onclick="deleteStudent(${index})">

Delete

</button>


</div>


`;


});


}







function searchStudents(){


let searchValue = 
document.getElementById("searchStudent")
.value
.toLowerCase();



let filtered = students.filter(student =>



student.id.toLowerCase().includes(searchValue) ||


student.first.toLowerCase().includes(searchValue) ||


student.last.toLowerCase().includes(searchValue)



);



displayRecords(filtered);



}







function deleteStudent(index){


students.splice(index,1);



localStorage.setItem(
"students",
JSON.stringify(students)
);



displayRecords();



}








function exportRecords(){


let file=new Blob(

[JSON.stringify(students,null,2)],

{type:"application/json"}

);



let link=document.createElement("a");


link.href=URL.createObjectURL(file);


link.download="Student_Records.json";


link.click();



}








document.getElementById("themeToggle")
.onclick=function(){


document.body.classList.toggle("dark");



this.innerHTML=


document.body.classList.contains("dark")


?


"☀️ Light Mode"


:


"🌙 Dark Mode";



};



</script>


</body>
</html>

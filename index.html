<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Information System</title>



<style>

*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}


body{

    background:#eef2f7;
    color:#333;
    font-family:Tahoma, sans-serif;
    transition:.4s;
    display:flex;
    flex-direction:column;
    min-height:100vh;

}



header{

    background:#004080;
    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:30px 20px;

    position:relative;

    text-align:center;

}


header h1{

    font-family:Tahoma, sans-serif;
    font-weight:bold;

}



header p{

    margin-top:8px;

}



#themeToggle{

    position:absolute;
    right:25px;
    top:20px;

    padding:10px 18px;

    border:none;
    border-radius:25px;

    background:#FFD700;
    color:#003366;

    font-weight:bold;

    cursor:pointer;

}



#themeToggle:hover{

    transform:scale(1.05);

}





nav{

    background:#003366;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-wrap:wrap;

    gap:15px;

    padding:15px;

}



nav button{

    background:none;

    border:none;

    color:white;

    font-size:16px;

    cursor:pointer;

    font-weight:bold;

}



nav button:hover,
nav button:focus{

    color:#FFD700;

}





.container{

    width:90%;
    max-width:900px;

    margin:30px auto;

    background:white;

    padding:30px;

    border-radius:10px;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

    flex:1;

}




.row{

    display:flex;

    flex-wrap:wrap;

    gap:15px;

    margin-bottom:15px;

}

.column{

    flex:1 1 300px;

}



label{

    display:block;

    font-weight:bold;

    margin-bottom:5px;

}


img{

    max-width:100%;

    height:auto;

}

input,
select,
textarea{

    width:100%;

}

input,
select,
textarea{


    width:100%;

    padding:12px;

    border:1px solid #ccc;

    border-radius:5px;

    font-size:15px;

    font-family:'Roboto',sans-serif;


}



input:focus,
select:focus,
textarea:focus{


    outline:none;

    border-color:#004080;

    box-shadow:0 0 5px #FFD700;


}




.buttons{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-top:20px;

}

.buttons button{

    flex:1 1 220px;

}

button{

    cursor:pointer;

}







.save{

    flex:1;

    padding:12px;

    background:#004080;

    color:white;

    border:none;

    border-radius:5px;

    font-weight:bold;

}



.save:hover{

    background:#0059b3;

}





.reset{

    flex:1;

    padding:12px;

    background:#dc3545;

    color:white;

    border:none;

    border-radius:5px;

}





.export{

    width:100%;

    margin-top:15px;

    padding:12px;

    background:#198754;

    color:white;

    border:none;

    border-radius:5px;

    font-weight:bold;

}






#success{


    display:none;

    margin-top:15px;

    padding:15px;

    background:#d4edda;

    color:#155724;

    text-align:center;

    border-radius:5px;

    animation:fade .4s;


}



@keyframes fade{

from{

opacity:0;

}

to{

opacity:1;

}

}




#searchStudent{


    width:100%;

    padding:12px;

    border:2px solid #004080;

    border-radius:5px;

    font-size:16px;


}





.studentCard{


    background:#f8f9fa;

    padding:15px;

    margin-bottom:15px;

    border-radius:8px;

    border-left:5px solid #004080;


}





.studentCard b{

    font-family:"Courier New", monospace;

}





.delete{


    margin-top:10px;

    padding:8px 15px;

    background:#dc3545;

    color:white;

    border:none;

    border-radius:5px;


}





.delete:hover{

    background:#b02a37;

}





.hidden{

    display:none;

}





footer{


    text-align:center;

    background:#004080;

    color:white;

    padding:15px;

    margin-top:30px;


}

.tableWrapper{

    width:100%;
    overflow-x:auto;

}

.studentTable{

    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    margin-bottom:30px;

}

.studentTable th{

    background:#004080;
    color:white;
    padding:12px;

}

.studentTable td{

    border:1px solid #ccc;
    padding:10px;
    text-align:center;

}

.studentTable tr:nth-child(even){

    background:#f5f5f5;

}

.studentTable tr:hover{

    background:#e8f0ff;

}

body.dark .studentTable tr:nth-child(even){

    background:#2b2b2b;

}

body.dark .studentTable td{

    border:1px solid #555;

}

/* DARK MODE */


body.dark{

    background:#121212;

    color:white;

}



body.dark .container{

    background:#1e1e1e;

}



body.dark input,
body.dark select,
body.dark textarea{

    background:#333;

    color:white;

}



body.dark .studentCard{

    background:#2b2b2b;

}



body.dark h2{

    color:#66b3ff;

}






@media (max-width:768px){

    header{

        padding:25px 15px;

    }

    #themeToggle{

        position:static;

        margin-bottom:15px;

    }

    nav{

        flex-direction:column;

    }

    .row{

        flex-direction:column;

    }

    .buttons{

        flex-direction:column;

    }

    .container{

        width:95%;

        padding:20px;

    }

}


</style>
</head>


<body>


<header>


<button id="themeToggle">

🌙 Dark Mode

</button>


<h1>

BSIT Student Information System

</h1>


<p>

Manage Student Records Efficiently

</p>


</header>





<nav>


<button onclick="showPage('registration')">

📝 Registration

</button>


<button onclick="showPage('records')">

📋 Records

</button>


</nav>





<div class="container">





<!-- REGISTRATION PAGE -->


<div id="registration">


<h2>

Student Registration Form

</h2>





<form id="studentForm">





<label>

Student ID

</label>


<input
type="number"
id="studentID"
placeholder="Enter Student ID"
required>





<div class="row">

<div class="column">

<label>
Last Name
</label>

<input 
id="lname"
placeholder="Enter last name"
required>

</div>


<div class="column">

<label>
First Name
</label>

<input 
id="fname"
placeholder="Enter first name"
required>

</div>

</div>



<label>Gender</label>

<select id="gender" required>
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
    
</select>



<label>

Year Level

</label>


<select id="year">
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>


<label>Program</label>

<input
    type="text"
    id="program"
    value="BS Information Technology"
    readonly>





<label>
Email
</label>

<input 
type="email"
id="email"
placeholder="example@email.com"
required>




<label>
Phone Number
</label>
    
<input
type="tel"
id="phone"
pattern="[0-9]{11}"
maxlength="11"
placeholder="09XXXXXXXXX"
required>





<label>
Address
</label>


<textarea 
id="address"
rows="3"
placeholder="Enter complete address">
</textarea>







<div class="buttons">



<button class="save">

💾 Save Information

</button>




<button 
type="reset"
class="reset">

Clear

</button>



</div>




</form>





<div id="success">

</div>





</div>









<!-- RECORD PAGE -->



<div id="records" class="hidden">



<h2>

Saved Student Records

</h2>


<div id="recordCount" class="countBox"></div>

<br>


<input 

type="text"

id="searchStudent"

placeholder="🔍 Search by Student ID or Student Name..."

onkeyup="searchStudents()"

>





<br><br>






<div id="recordList">

</div>





<button 

class="export"

onclick="exportRecords()">


📁 Export Records


</button>






</div>






</div>







<footer>


© 2026 BSIT Student Information System


</footer>
<script>


let students =
JSON.parse(localStorage.getItem("students")) || [];




// PAGE NAVIGATION

function showPage(page){


document.getElementById("registration")
.classList.add("hidden");


document.getElementById("records")
.classList.add("hidden");



document.getElementById(page)
.classList.remove("hidden");



if(page=="records"){

displayRecords();

}


}





// SAVE STUDENT INFORMATION

document.getElementById("studentForm")
.addEventListener("submit",function(e){


e.preventDefault();



let student={

id:document.getElementById("studentID").value.trim(),
first:document.getElementById("fname").value.trim(),
last:document.getElementById("lname").value.trim(),
gender: document.getElementById("gender").value,
year:document.getElementById("year").value,
program:document.getElementById("program").value,
email:document.getElementById("email").value.trim(),
phone:document.getElementById("phone").value.trim(),
address:document.getElementById("address").value.trim()

};





// ERROR PREVENTION


if(student.id === ""){

    alert("Enter Student ID");

    return;

}

if(student.phone.length !== 11){

    alert("Phone number must be 11 digits.");

    return;

}

if(student.gender === ""){
alert("⚠ Please select your gender.");
document.getElementById("gender").focus();
return;
}


let duplicate =
students.some(s => s.id === student.id);
if(duplicate){
alert("⚠ Student ID already exists.");
return;
}
// CHECK FOR DUPLICATE FULL NAME
if (students.some(s =>
    s.first.toLowerCase() === student.first.toLowerCase() &&
    s.last.toLowerCase() === student.last.toLowerCase()
)) {
    alert("⚠ A student with the same full name already exists.");
    return;
}

// CHECK FOR DUPLICATE EMAIL
if (students.some(s =>
    s.email.toLowerCase() === student.email.toLowerCase()
)) {
    alert("⚠ Email address already exists.");
    return;
}

// CHECK FOR DUPLICATE PHONE NUMBER
if (students.some(s =>
    s.phone === student.phone
)) {
    alert("⚠ Phone number already exists.");
    return;
}




let confirmSave = confirm("Do you want to save this student information?");

if(confirmSave){

    students.push(student);

    localStorage.setItem(
        "students",
        JSON.stringify(students)
    );

    // FEEDBACK
    let success = document.getElementById("success");

    success.style.display = "block";

    success.innerHTML =
    "✅ Student information saved successfully!";

    document.getElementById("studentForm").reset();

    setTimeout(() => {
        success.style.display = "none";
    }, 3000);

}else{

    alert("❌ Save cancelled.");

}






});


// DISPLAY RECORDS


function displayRecords(filteredStudents = students){

    let list = document.getElementById("recordList");
    list.innerHTML = "";

    const years = [
        "1st Year",
        "2nd Year",
        "3rd Year",
        "4th Year"
    ];

    years.forEach(year => {

        let yearStudents = filteredStudents.filter(s => s.year === year);

        if(yearStudents.length === 0) return;

        yearStudents.sort((a,b)=>{
            let last = a.last.localeCompare(b.last);
            if(last !== 0) return last;
            return a.first.localeCompare(b.first);
        });

        let table = `
            <h3 style="margin-top:25px;color:#004080;">${year}</h3>

            <div class="tableWrapper">
              <table class="studentTable">

                <thead>
                    <tr>
                        <th>Student ID</th>
                        <th>Name</th>
                        <th>Program</th>
                        <th>Gender</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
        `;

        yearStudents.forEach(student => {

            table += `
                <tr>
                    <td>${student.id}</td>
                    <td>${student.last}, ${student.first}</td>
                    <td>${student.program}</td>
                    <td>${student.gender}</td>
                    <td>${student.email}</td>
                    <td>${student.phone}</td>

                    <td>
                        <button class="delete"
                        onclick="deleteStudent('${student.id}')">
                        Delete
                        </button>
                    </td>
                </tr>
            `;

        });

        table += `
                </tbody>
            </table>
          </div>
        `;

        list.innerHTML += table;

    });

    if(list.innerHTML === ""){
        list.innerHTML = "<p>No student records found.</p>";
    }

}







// SEARCH FUNCTION


function searchStudents(){


let keyword =

document.getElementById("searchStudent")

.value

.toLowerCase();





let result = students.filter(student =>



student.id.toLowerCase()
.includes(keyword)

||

student.first.toLowerCase()
.includes(keyword)

||

student.last.toLowerCase()
.includes(keyword)



);





displayRecords(result);






}





// DELETE FUNCTION


function deleteStudent(id){

    let confirmDelete = confirm(
        "Are you sure you want to delete this student record?"
    );

    if(confirmDelete){

        students = students.filter(student => student.id !== id);

        localStorage.setItem(
            "students",
            JSON.stringify(students)
        );

        displayRecords();

        alert("✅ Student record deleted.");

    }

}





// EXPORT RECORDS


function exportRecords(){

    const years = [
        "1st Year",
        "2nd Year",
        "3rd Year",
        "4th Year"
    ];

    let html = `
    <!DOCTYPE html>
    <html>
    <head>
        <title>Student Records</title>

        <style>

        body{
            font-family:Arial,sans-serif;
            margin:30px;
        }

        h1{
            text-align:center;
        }

        h2{
            margin-top:35px;
            background:#004080;
            color:white;
            padding:10px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:10px;
        }

        th,td{
            border:1px solid black;
            padding:8px;
            text-align:center;
        }

        th{
            background:#d9e8ff;
        }

        </style>

    </head>

    <body>

    <h1>Student Information System</h1>
    <p><b>Date Exported:</b> ${new Date().toLocaleString()}</p>
    `;

    years.forEach(year=>{

        let yearStudents = students
            .filter(s=>s.year===year)
            .sort((a,b)=>{

                let last = a.last.localeCompare(b.last);

                if(last!==0) return last;

                return a.first.localeCompare(b.first);

            });

        html += `<h2>${year}</h2>`;

        if(yearStudents.length===0){

            html += `<p>No records available.</p>`;

            return;

        }

        html += `
        <table>

        <tr>

            <th>Student ID</th>
            <th>Name</th>
            <th>Gender</th>
            <th>Program</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>

        </tr>
        `;

        yearStudents.forEach(s=>{

            html += `
            <tr>

                <td>${s.id}</td>
                <td>${s.last}, ${s.first}</td>
                <td>${s.gender}</td>
                <td>${s.program}</td>
                <td>${s.email}</td>
                <td>${s.phone}</td>
                <td>${s.address}</td>

            </tr>
            `;

        });

        html += "</table>";

    });

    html += `
    </body>
    </html>
    `;

    let blob = new Blob([html], {type:"text/html"});

    let link = document.createElement("a");

    link.href = URL.createObjectURL(blob);

    link.download = "Student_Records.html";

    link.click();

    alert("✅ Student records exported successfully!");

}








// DARK MODE


document.getElementById("themeToggle")

.onclick=function(){



document.body.classList.toggle("dark");




this.innerHTML =



document.body.classList.contains("dark")

?


"☀️ Light Mode"


:


"🌙 Dark Mode";



};





</script>


</body>

</html>
